$scrPath = ~/.config/hyprdots/scripts

# ‚Ėą‚ĖÄ‚ĖÄ‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚Ėą
# ‚Ėą‚Ėą‚ĖĄ‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚ĖÄ‚ĖĄ‚ĖÄ

env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_SCALE_FACTOR,1
env = GDK_SCALE,1
env = MOZ_ENABLE_WAYLAND,1
env = WAYLAND_DISPLAY=wayland-1
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = GDK_BACKEND,wayland

# ‚Ėą‚ĖĎ‚ĖĎ‚ÄÉ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖÄ‚ÄÉ‚Ėą‚ĖĎ‚Ėą
# ‚Ėą‚ĖĄ‚ĖĄ‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĄ‚ÄÉ‚Ėą‚ĖÄ‚Ėą

exec-once = xdg-portal-hyprland
exec-once = rfkill block bluetooth
exec-once = bat cache --build
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 & 
exec-once = systemctl --user import-environment XDG_SESSION_TYPE XDG_CURRENT_DESKTOP WAYLAND_DISPLAY QT_QPA_PLATFORMTHEME
exec-once = swww-daemon
exec-once = ~/.config/waybar/bin/reloadway # ## Set Waybar ##
exec-once = mako # ## Set Notification Daemon ##

# ## Xwayland ##

xwayland {
  force_zero_scaling = true
  use_nearest_neighbor = false
}

# ## Configure mouse and touchpad here. ##

input {
    kb_layout = us, ru
    kb_options = grp:alt_shift_toggle
    numlock_by_default = yes
    follow_mouse = 1
    sensitivity = 0.75

    touchpad {
      natural_scroll = no
      disable_while_typing = no
      middle_button_emulation = no
      drag_lock = no
    }
}


# ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖÄ‚ÄÉ‚Ėą‚ĖÄ‚ĖÄ
# ‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ĖĄ‚ÄÉ‚Ėą‚ĖĄ‚ĖĄ‚ÄÉ‚Ėą‚Ėą‚ĖĄ
source=~/.config/hypr/catppuccin-mocha.conf # Colors
source=~/.config/hypr/monitors.conf
source=~/.config/hypr/animations.conf
source=~/.config/hypr/windowrules.conf
source=~/.config/hypr/keybindings.conf


gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}

# ‚Ėą‚ĖĎ‚ĖĎ‚ÄÉ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚Ėą‚ÄÉ‚ĖÄ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ĖÄ
# ‚Ėą‚ĖĄ‚ĖĄ‚ÄÉ‚Ėą‚ĖÄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚ĖĎ‚Ėą‚ĖĎ‚ÄÉ‚ĖĄ‚Ėą

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more

dwindle {
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

decoration {
    dim_special = 0.3
    blur {
        special = true
    }
}

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(565f89cc) rgba(9aa5cecc) 45deg
    col.inactive_border = rgba(deffff77) rgba(00000000) 45deg
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 10
    drop_shadow = false

    blur {
        enabled = yes
        size = 9
        passes = 3
        new_optimizations = on
        ignore_opacity = on
        xray = false
    }
}
# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more

master {
    new_is_master = true
}

# ‚Ėą‚ĖÄ‚ĖĄ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖÄ‚ÄÉ‚Ėą‚ĖÄ‚ĖÄ
# ‚Ėą‚ĖĎ‚ĖÄ‚ĖĎ‚Ėą‚ÄÉ‚Ėą‚ÄÉ‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĄ

# See https://wiki.hyprland.org/Configuring/Variables/ for more

misc {
    vrr = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}
