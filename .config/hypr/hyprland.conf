# █▀▀ █▄░█ █░█
# ██▄ █░▀█ ▀▄▀

$scrPath = ~/.config/hyprdots/scripts

# █░░ ▄▀█ █░█ █▄░█ █▀▀ █░█
# █▄▄ █▀█ █▄█ █░▀█ █▄▄ █▀█

# ## Xwayland ##

xwayland {
  force_zero_scaling = true
  use_nearest_neighbor = false
}

# ## Configure mouse and touchpad here. ##

input {
    kb_layout = us, ru
    kb_options = grp:alt_shift_toggle
    numlock_by_default = yes
    follow_mouse = 1
    sensitivity = 0.75

    touchpad {
      natural_scroll = no
      disable_while_typing = no
      middle_button_emulation = no
      drag_lock = no
    }
}


# █▀ █▀█ █░█ █▀█ █▀▀ █▀▀
# ▄█ █▄█ █▄█ █▀▄ █▄▄ ██▄

source=~/.config/hypr/startup.conf
source=~/.config/hypr/env.conf
source=~/.config/hypr/catppuccin-mocha.conf # Colors
source=~/.config/hypr/monitors.conf
source=~/.config/hypr/animations.conf
source=~/.config/hypr/windowrules.conf
source=~/.config/hypr/keybindings.conf


gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}

# █░░ ▄▀█ █▄█ █▀█ █░█ ▀█▀ █▀
# █▄▄ █▀█ ░█░ █▄█ █▄█ ░█░ ▄█

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more

dwindle {
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

decoration {
    dim_special = 0.3
    blur {
        special = true
    }
}

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(565f89cc) rgba(9aa5cecc) 45deg
    col.inactive_border = rgba(deffff77) rgba(00000000) 45deg
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 10
    drop_shadow = false

    blur {
        enabled = yes
        size = 9
        passes = 3
        new_optimizations = on
        ignore_opacity = on
        xray = false
    }
}
# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more

master {
    new_is_master = true
}

# █▀▄▀█ █ █▀ █▀▀
# █░▀░█ █ ▄█ █▄▄

# See https://wiki.hyprland.org/Configuring/Variables/ for more

misc {
    vrr = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}
